<h2 mat-dialog-title>Eliminar registro</h2>

<mat-dialog-content class="content">
  <p>
    Esta seguro q desea eliminar
    <strong>{{ data.nombre }}</strong>?
  </p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="cancelar()">
    Cancelar
  </button>
  <button mat-flat-button color="warn" type="button" (click)="confirmar()">
    Si, eliminar
  </button>
</mat-dialog-actions>
